<svg width="800" height="150" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="100%" height="100%" fill="transparent"/>

  <!-- Icon: Fried egg-inspired colors, oversized -->
  <g transform="translate(40, 20) scale(2.5)">
    <!-- Egg white -->
    <circle cx="30" cy="30" r="30" fill="#fdfdfb" stroke="#444" stroke-width="2"/>
    <!-- Egg yolk with smiley -->
    <circle cx="30" cy="30" r="18" fill="#ffd000"/>
    <circle cx="24" cy="25" r="2.5" fill="#2b2b2b"/>
    <circle cx="36" cy="25" r="2.5" fill="#2b2b2b"/>
    <path d="M24 36 Q30 42 36 36" stroke="#2b2b2b" stroke-width="2" fill="none"/>
  </g>

  <!-- Name centered vertically -->
  <text x="260" y="50%" dominant-baseline="middle" text-anchor="start"
        font-family="'Inter', 'Helvetica Neue', sans-serif" font-size="88" font-weight="bold" fill="white"
        letter-spacing="1.5">
    Jacob Edie
  </text>
</svg>
